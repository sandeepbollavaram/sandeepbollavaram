name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate trophies SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, math

          token = os.environ['GITHUB_TOKEN']
          username = 'sandeepbollavaram'

          # Fetch stats via GitHub REST API
          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'Authorization': f'token {token}',
                  'Accept': 'application/vnd.github.v3+json'
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          user = fetch(f'https://api.github.com/users/{username}')
          repos = fetch(f'https://api.github.com/users/{username}/repos?per_page=100&type=owner')
          
          stars = sum(r['stargazers_count'] for r in repos)
          forks = sum(r['forks_count'] for r in repos)
          followers = user['followers']
          public_repos = user['public_repos']
          
          def rank(val, tiers):
              for t, label in tiers:
                  if val >= t: return label
              return 'Bronze'
          
          rank_color = {'Gold': '#fbbf24', 'Silver': '#94a3b8', 'Bronze': '#cd7f32'}
          
          trophies = [
              ('Stars',     stars,        rank(stars,     [(10,'Gold'),(5,'Silver'),(1,'Bronze')]),   '#fbbf24', '★'),
              ('Followers', followers,    rank(followers, [(10,'Gold'),(5,'Silver'),(1,'Bronze')]),   '#6366f1', 'U0001f465'),
              ('Repos',     public_repos, rank(public_repos,[(20,'Gold'),(10,'Silver'),(5,'Bronze')]),'#22c55e', 'U0001f4e6'),
              ('Forks',     forks,        rank(forks,     [(10,'Gold'),(5,'Silver'),(1,'Bronze')]),   '#0ea5e9', 'U0001f500'),
              ('Commits',   1459,         'Gold',                                                     '#ef4444', 'U0001f525'),
              ('MCP',       1,            'Gold',                                                     '#a855f7', 'U0001f916'),
              ('K8s',       1,            'Gold',                                                     '#326CE5', '⚙️'),
          ]

          W, H, GAP = 115, 155, 8
          COLS = 7
          TOTAL_W = COLS * W + (COLS - 1) * GAP

          cards = []
          for i, (title, value, rnk, color, icon) in enumerate(trophies):
              x = i * (W + GAP)
              rc = rank_color[rnk]
              card = f'''  <g transform="translate({x}, 0)">
                  <rect width="{W}" height="{H}" rx="10" fill="#0d1117" stroke="{rc}" stroke-width="1.5"/>
                  <text x="{W//2}" y="30" text-anchor="middle" font-size="20" fill="{rc}">&#x1F3C6;</text>
                  <text x="{W//2}" y="60" text-anchor="middle" font-size="24" fill="{color}">{icon}</text>
                  <text x="{W//2}" y="88" text-anchor="middle" font-size="20" font-weight="bold" fill="#f8fafc">{value}</text>
                  <text x="{W//2}" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">{title}</text>
                  <rect x="{(W-52)//2}" y="118" width="52" height="20" rx="5" fill="{rc}33"/>
                  <text x="{W//2}" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="{rc}">{rnk}</text>
              </g>'''
              cards.append(card)

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{TOTAL_W}" height="{H}" viewBox="0 0 {TOTAL_W} {H}">
            <defs><style>text {{ font-family: "Segoe UI", Arial, sans-serif; }}</style></defs>
          {''.join(cards)}
          </svg>'''

          os.makedirs('dist', exist_ok=True)
          with open('dist/trophies.svg', 'w') as f:
              f.write(svg)
          print(f'Done! stars={stars} followers={followers} repos={public_repos}')
          PYEOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
